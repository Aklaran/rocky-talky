# Rocky Talky — nginx reverse proxy + static file serving
# Staging and Production environments
#
# Install: sudo cp deploy/nginx/rocky-talky.conf /opt/homebrew/etc/nginx/servers/
# Reload:  nginx -s reload

# --- Staging ---
server {
    listen 7211;
    server_name localhost;

    # Static files with long-term caching (Vite content-hashed filenames)
    location /assets/ {
        alias /Users/annapurna/repos/rocky-talky/app/frontend/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # Everything else proxied to Express (API + SPA fallback)
    location / {
        proxy_pass http://127.0.0.1:7210;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support — disable buffering for streaming
        proxy_buffering off;
        proxy_cache off;
    }
}

# --- Production ---
server {
    listen 7201;
    server_name localhost;

    location /assets/ {
        alias /Users/annapurna/repos/rocky-talky/app/frontend/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    location / {
        proxy_pass http://127.0.0.1:7202;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support — disable buffering for streaming
        proxy_buffering off;
        proxy_cache off;
    }
}
